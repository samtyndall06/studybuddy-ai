<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBuddy AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">📚 StudyBuddy</div>
        <nav class="sidebar-nav">
            <button class="nav-btn active" data-mode="chat">💬 Chat</button>
            <button class="nav-btn" data-mode="quiz">🧠 Quiz</button>
            <button class="nav-btn" data-mode="flashcards">📇 Flashcards</button>
            <button class="nav-btn" data-mode="notes">📝 Notes</button>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">

        <!-- CHAT MODE -->
        <div class="view active" id="chat-view">
            <div class="chat-header">
                <h1>Chat with StudyBuddy</h1>
                <p>Ask me to explain any concept, any subject</p>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="message ai-message">
                    <div class="message-bubble">
                        Hey! I'm StudyBuddy. Ask me to explain something, and I'll break it down for you. What are you studying today?
                    </div>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Ask me anything..." />
                <button id="send-btn">Send</button>
            </div>
        </div>

        <!-- QUIZ MODE -->
        <div class="view" id="quiz-view">
            <div class="chat-header">
                <h1>Quiz Mode</h1>
                <p>Test your knowledge on any topic</p>
            </div>
        
            <!-- Topic selection screen -->
            <div class="quiz-setup" id="quiz-setup">
                <div class="quiz-setup-card">
                    <label>What topic do you want to be quizzed on?</label>
                    <input type="text" id="quiz-topic"
                        placeholder="e.g. Binary search trees, Microeconomics, French Revolution" />
                    <label>Number of questions</label>
                    <select id="quiz-count">
                        <option value="3">3 questions</option>
                        <option value="5" selected>5 questions</option>
                        <option value="10">10 questions</option>
                    </select>
                    <button id="start-quiz-btn">Start Quiz</button>
                </div>
            </div>
        
            <!-- Active quiz screen -->
            <div class="quiz-active" id="quiz-active" style="display:none;">
                <div class="quiz-progress">
                    <span id="quiz-progress-text">Question 1 of 5</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
                <div class="quiz-question-card">
                    <p class="quiz-question" id="quiz-question"></p>
                    <textarea id="quiz-answer" placeholder="Type your answer here..."></textarea>
                    <button id="submit-answer-btn">Submit Answer</button>
                </div>
                <div class="quiz-feedback" id="quiz-feedback" style="display:none;"></div>
            </div>
        
            <!-- Results screen -->
            <div class="quiz-results" id="quiz-results" style="display:none;">
                <h2>Quiz Complete!</h2>
                <p class="quiz-score" id="quiz-score"></p>
                <button id="new-quiz-btn">Start New Quiz</button>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
